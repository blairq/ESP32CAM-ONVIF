[platformio]
default_envs = esp32cam
boards_dir = boards

; ==============================================================================
;   Common settings for all ESP-IDF camera boards
; ==============================================================================
[env]
platform = espressif32
framework = espidf
monitor_speed = 115200

build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections

; ==============================================================================
;   ESP32 Boards (Classic)
; ==============================================================================

; AI-Thinker ESP32-CAM (Most Common)
[env:esp32cam]
board = esp32cam
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.partitions = partitions.csv

; ESP-WROVER-KIT
[env:esp_wrover_kit]
board = esp-wrover-kit

; ESP-EYE
[env:esp_eye]
board = esp32dev

; M5Stack Camera
[env:m5stack_camera]
board = m5stack-core-esp32

; TTGO T-Camera
[env:ttgo_t_camera]
board = ttgo-t1

; ==============================================================================
;   ESP32-S3 Boards
; ==============================================================================

; Seeed XIAO ESP32S3 Sense
[env:seeed_xiao_esp32s3_sense]
board = seeed_xiao_esp32s3

; Freenove ESP32-S3 WROOM CAM
[env:freenove_esp32s3_cam]
board = esp32-s3-devkitc-1

; ESP32-S3-EYE
[env:esp32s3_eye]
board = esp32-s3-devkitc-1

; ==============================================================================
;   Custom Boards (Using local JSON definitions in boards/ folder)
; ==============================================================================
[env:custom_esp32_audio_cam]
board = custom_esp32_audio_cam

